name: Image1

on:
  workflow_dispatch:

jobs:
 push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Hello World
        run: docker pull hello-world:latest

      - name: Tag Image
        run: |
          docker tag hello-world:latest ${{ vars.DOCKERHUB_USERNAME }}/hello-world:latest

      - name: List Images
        run: docker images

      - name: Push Image
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/hello-world:latest

      - name: Verify
        run: echo "Image pushed successfully!"
